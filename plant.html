<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForageSafe - Result</title>
    <link href="/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="top-bar">
      <a href="/camera" id="back-btn">← Scan Again</a>
    </div>

    <div id="plant-container">
      <!-- safety badge -->
      <div id="safety-badge">
        <span id="badge-text">Checking safety...</span>
      </div>

      <!-- plant identity -->
      <div id="plant-identity">
        <h1 id="common-name">Loading...</h1>
        <p id="latin-name"></p>
        <p id="confidence"></p>
      </div>

      <!-- plant image -->
      <div id="plant-image-container">
        <img id="plant-image" src="" alt="Plant image" style="display: none" />
      </div>

      <!-- edibility info -->
      <div id="edibility-section">
        <h2>Edibility</h2>
        <p id="edibility-info">Loading...</p>
      </div>

      <!-- how to use -->
      <div id="how-to-section">
        <h2>How to Use</h2>
        <p id="how-to-info">Loading...</p>
      </div>

      <!-- hazards -->
      <div id="hazard-section">
        <h2>Known Hazards</h2>
        <p id="hazard-info">Loading...</p>
      </div>
    </div>

    <script src="/plantData.js"></script>
  </body>
</html>
